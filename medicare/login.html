<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MediTrack</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <aside class="auth-visual">
      <a href="index.html" class="brand"><span class="brand-mark">M</span> MediTrack</a>
      <div class="auth-tagline">
        <h2>Welcome back to your pharmacy hub</h2>
        <p>Sign in to manage orders, track inventory, and continue shopping with saved preferences.</p>
      </div>
      <p style="opacity:0.55;font-size:0.85rem;position:relative;z-index:1">Demo: admin@meditrack.com / admin123</p>
    </aside>
    <div class="auth-form-wrap">
      <div class="auth-card">
        <h1>Sign in</h1>
        <p>Access your MediTrack account</p>
        <div id="login-alert" class="alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <label class="form-check">
            <input type="checkbox" /> Remember me
          </label>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <div class="auth-footer">
          New here? <a href="register.html">Create an account</a>
          <br /><a href="index.html" style="display:inline-block;margin-top:0.75rem">← Back to home</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
