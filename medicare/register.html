<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — MediTrack</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <aside class="auth-visual">
      <a href="index.html" class="brand"><span class="brand-mark">M</span> MediTrack</a>
      <div class="auth-tagline">
        <h2>Join MediTrack today</h2>
        <p>Create your account to shop medicines, save orders, and manage your pharmacy profile.</p>
      </div>
      <p style="opacity:0.55;font-size:0.85rem;position:relative;z-index:1">Secure demo registration stored locally in your browser.</p>
    </aside>
    <div class="auth-form-wrap">
      <div class="auth-card">
        <h1>Create account</h1>
        <p>Fill in your details to get started</p>
        <div id="reg-alert" class="alert"></div>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-name">Full name</label>
            <input type="text" id="reg-name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="reg-phone">Phone</label>
            <input type="tel" id="reg-phone" placeholder="10-digit mobile" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="Min 6 characters" required />
            </div>
            <div class="form-group">
              <label for="reg-confirm">Confirm</label>
              <input type="password" id="reg-confirm" placeholder="Repeat password" required />
            </div>
          </div>
          <label class="form-check">
            <input type="checkbox" required /> I agree to the terms & privacy policy
          </label>
          <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
          <br /><a href="index.html" style="display:inline-block;margin-top:0.75rem">← Back to home</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
